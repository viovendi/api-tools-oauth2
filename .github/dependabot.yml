version: 2
updates:
  # PHP Composer dependencies - SCAN ONLY MODE
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      # Check weekly on Tuesdays at 4 PM Berlin time
      interval: "weekly"
      day: "tuesday"
      time: "16:00"
      timezone: "Europe/Berlin"
    
    # IMPORTANT: Set to 0 to prevent any automatic PRs
    # This enables vulnerability scanning without creating update PRs
    open-pull-requests-limit: 0
    
    # Only scan for security vulnerabilities in current versions
    # No updates will be proposed, only alerts will be generated
    allow: []
