version: 2
updates:
  # PHP Composer dependencies
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      # Check weekly on Mondays at 9 AM Berlin time
      interval: "weekly"
      day: "tuesday"
      time: "16:00"
      timezone: "Europe/Berlin"
    
    # Limit open PRs to avoid spam
    open-pull-requests-limit: 5
    
    # Commit message formatting
    commit-message:
      prefix: "security"
      prefix-development: "chore"
      include: "scope"
    
    # Auto-assign reviewer
    reviewers:
      - "ivan-babuka"
    
    # Labels for easy filtering
    labels:
      - "dependencies"
      - "security-update"
      - "automated-pr"
    
    # Version update strategy
    versioning-strategy: "increase-if-necessary"
    
    # Group related updates
    groups:
      laminas:
        patterns:
          - "laminas/*"
        update-types:
          - "patch"
