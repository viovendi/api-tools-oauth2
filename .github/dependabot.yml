# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"


version: 2
updates:
  # PHP Composer dependencies
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      # Check weekly on Mondays at 9 AM Berlin time
      interval: "weekly"
      day: "tuesday"
      time: "18:00"
      timezone: "Europe/Berlin"
    
    # Limit open PRs to avoid spam
    open-pull-requests-limit: 5
    
    # Security updates only (since it's a library fork)
    # Remove this line to get all updates
    enable-security-updates: true
    
    # Commit message formatting
    commit-message:
      prefix: "security"
      prefix-development: "chore"
      include: "scope"
    
    # Auto-assign reviewer
    reviewers:
      - "ivan-babuka"
    
    # Labels for easy filtering
    labels:
      - "dependencies"
      - "security-update"
      - "automated-pr"
    
    # Version update strategy
    versioning-strategy: "increase-if-necessary"
    
    # Group related updates
    groups:
      laminas:
        patterns:
          - "laminas/*"
        update-types:
          - "patch"
