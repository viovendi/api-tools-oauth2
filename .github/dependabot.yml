version: 2
updates:
  # PHP Composer dependencies - SCAN ONLY MODE
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      # Check weekly on Tuesdays at 4 PM Berlin time
      interval: "weekly"
      day: "tuesday"
      time: "16:00"
      timezone: "Europe/Berlin"

    open-pull-requests-limit: 10

